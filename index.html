<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance Strategy Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="main-nav">
        <button class="nav-tab active" onclick="cambiaPagina('home')">Home</button>
        <button class="nav-tab" onclick="cambiaPagina('crea-profumo')">Crea Profumo</button>
        <button class="nav-tab" onclick="cambiaPagina('fragranze-brand')">Fragranze Brand</button>
        <button class="nav-tab" onclick="cambiaPagina('progetto-x')">Progetto X</button>
        <button class="nav-tab" onclick="cambiaPagina('progetto-y')">Progetto Y</button>
        <button class="nav-tab" id="tab-preventivo" style="display:none;" onclick="cambiaPagina('preventivo-page')">Preventivo</button>
    </nav>

    <main id="app-content">

        <section id="home" class="page-section active">
            <div class="hero-image-container">
                <img src="assets/home-render.jpg" alt="Render Profumo" class="hero-bg" onerror="this.src='https://via.placeholder.com/1200x800?text=FRAGRANCE+STRATEGY+HUB'">
                <h1 class="hero-title">FRAGRANCE STRATEGY HUB</h1>
            </div>
        </section>

        <section id="crea-profumo" class="page-section">
            <div class="configurator-layout">
                <div class="sidebar-componenti">
    <button class="comp-btn active" data-cat="bottiglia" onclick="caricaCategoria('bottiglia')">BOTTIGLIA</button>
    <button class="comp-btn" data-cat="tappo" onclick="caricaCategoria('tappo')" disabled>TAPPO</button>
    <button class="comp-btn" data-cat="cache" onclick="caricaCategoria('cache')" disabled>CACHE</button>
    <button class="comp-btn" data-cat="pompa" onclick="caricaCategoria('pompa')" disabled>POMPA</button>
    <button class="comp-btn" id="btn-essenza" data-cat="essenza" onclick="mostraMenuEssenze()" disabled>ESSENZA</button>
</div>

                <div class="main-configurator">
                    <div class="top-bar-container">
                        <div class="top-filters" id="dynamic-filters"></div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button class="action-btn" onclick="resetConfiguratore()" style="background:#eee; border:1px solid #ccc; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Reset</button>
                            <input type="text" id="input-nome-preventivo" placeholder="Nome preventivo" maxlength="12" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                            <button id="btn-genera-render" class="action-btn blue-btn" onclick="generaRender()" disabled>Genera Render</button>
                        </div>
                    </div>

                    <div class="cards-grid" id="items-grid"></div>

                    <div class="bottom-dock-container">
                        <div class="dock-row packaging-dock">
                            <div class="miniatures-container" id="miniatures-container"></div>
                        </div>
                        <div class="dock-row essence-dock">
                            <div class="notes-container" id="notes-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="progetto-x" class="page-section">
            <div style="padding: 40px; text-align: center;"><h1>Progetto X</h1></div>
        </section>

        <section id="progetto-y" class="page-section">
            <div style="padding: 40px; text-align: center;"><h1>Progetto Y</h1></div>
        </section>

        <section id="preventivo-page" class="page-section">
            <div style="padding: 40px; text-align: center;">
                <h1 id="titolo-preventivo-dinamico" style="text-transform: uppercase; letter-spacing: 2px;"></h1>
                <div id="contenuto-preventivo"></div>
            </div>
        </section>

        <section id="fragranze-brand" class="page-section">
            <div class="section-header">
                <h2>Database Fragranze Brand</h2>
                <div id="brand-container">Caricamento list_profumi.csv...</div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
