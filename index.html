<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance Strategy Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="main-nav">
        <button class="nav-tab active" onclick="cambiaPagina('home')">Home</button>
        <button class="nav-tab" onclick="cambiaPagina('crea-profumo')">Crea Profumo</button>
        <button class="nav-tab" onclick="cambiaPagina('fragranze-brand')">Fragranze Brand</button>
        <button class="nav-tab" onclick="cambiaPagina('progetto-x')">Progetto X</button>
        <button class="nav-tab" onclick="cambiaPagina('progetto-y')">Progetto Y</button>
        <button class="nav-tab" id="tab-preventivo" style="display:none;" onclick="cambiaPagina('preventivo-page')">Preventivo</button>
    </nav>

    <main id="app-content">

        <section id="home" class="page-section active">
            <div class="hero-image-container">
                <img src="assets/home-render.jpg" alt="Render Profumo" class="hero-bg" onerror="this.src='https://via.placeholder.com/1920x1080?text=Fragrance+Hub'">
                <h1 class="hero-title">FRAGRANCE<br>STRATEGY HUB</h1>
            </div>
        </section>

        <section id="crea-profumo" class="page-section">
            <div class="configuratore-container">
                <aside class="sidebar-categorie" id="sidebar-categorie"></aside>

                <div class="main-configurator">
                    <div class="top-bar">
                        <input type="text" id="input-nome-preventivo" placeholder="Nome del progetto..." class="project-input">
                        <button id="btn-genera-render" class="btn-render" onclick="generaRender()">GENERA RENDER AI</button>
                    </div>

                    <div class="grid-prodotti" id="grid-prodotti"></div>

                    <div class="bottom-dock-container">
                        <div class="dock-row packaging-dock">
                            <div class="miniatures-container" id="miniatures-container"></div>
                        </div>
                        <div class="dock-row essence-dock">
                            <div class="notes-container" id="notes-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="progetto-x" class="page-section">
            <div style="padding: 40px; text-align: center;"><h1>Progetto X</h1></div>
        </section>

        <section id="progetto-y" class="page-section">
            <div style="padding: 40px; text-align: center;"><h1>Progetto Y</h1></div>
        </section>

        <section id="preventivo-page" class="page-section">
            <div style="padding: 40px; text-align: center;">
                <h1 id="titolo-preventivo-dinamico" style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;"></h1>
                
                <div id="status-ai" style="margin: 20px 0; font-weight: bold; color: #666;"></div>
                
                <div id="render-container" style="margin-bottom: 30px;">
                    <img id="img-render-ai" src="" alt="Render AI" style="display:none; max-width:800px; width:100%; border-radius:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 0 auto;">
                </div>

                <div id="contenuto-preventivo" style="text-align: left; max-width: 800px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 10px;"></div>
            </div>
        </section>

        <section id="fragranze-brand" class="page-section">
            <div class="section-header">
                <h2>Database Fragranze Brand</h2>
                <div id="brand-container">Caricamento list_profumi.csv...</div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
